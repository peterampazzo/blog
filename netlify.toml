[build]
  command = "pnpm run build"
  publish = ".next"

[functions]
  directory = ".netlify/functions"

[[redirects]]
  from = "/_next/static/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/_next/image"
  to = "/.netlify/images"
  status = 200
  query = { url = ":url", w = ":width", q = ":quality" }

[[redirects]]
  from = "/_ipx/*"
  to = "/.netlify/images"
  status = 200
  query = { url = ":url", w = ":width", q = ":quality" }
